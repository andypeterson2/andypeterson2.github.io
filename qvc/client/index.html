<!DOCTYPE html>
<html lang="en">
  <head>

    <meta name="description" content="QKD Video Chat — quantum-secure peer-to-peer video calling." />
    <meta

    <!-- ui-kit CSS -->

        document.documentElement.setAttribute('data-theme', t);
      })();
