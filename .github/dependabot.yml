version: 2
# This repo is the standalone Astro portal (no submodules). App frontends are vendored
# under public/<app>/; their backends live in separate repos with their own dependabot.
# Here we only update the root site manifest + pinned Actions.
updates:
  # Root portfolio (Astro site) npm dependencies
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      # Collapse low-risk bumps into a single PR to cut review noise; majors stay separate.
      npm-minor-patch:
        update-types:
          - minor
          - patch

  # Actions pinned in the root workflows
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      actions-minor-patch:
        update-types:
          - minor
          - patch
