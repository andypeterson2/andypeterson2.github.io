name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  changes:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      website: ${{ steps.filter.outputs.website }}
      qpk: ${{ steps.filter.outputs.qpk }}
      ui-kit: ${{ steps.filter.outputs.ui-kit }}
      cv: ${{ steps.filter.outputs.cv }}
      flask-core: ${{ steps.filter.outputs.flask-core }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            website:
              - 'src/**'
              - 'astro.config.mjs'
              - 'package.json'
              - 'packages/shared-js/**'
            qpk:
              - 'packages/quantum-protein-kernel/**'
            ui-kit:
              - 'packages/ui-kit/**'
            cv:
              - 'packages/cv/**'
            flask-core:
              - 'packages/flask-core/**'

  astro-build:
    needs: changes
    if: needs.changes.outputs.website == 'true' || needs.changes.outputs.ui-kit == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run build

  ui-kit-tests:
    needs: changes
    if: needs.changes.outputs.ui-kit == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: cd packages/ui-kit && npm ci && npx vitest run

  cv-tests:
    needs: changes
    if: needs.changes.outputs.cv == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: cd packages/cv/editor && npm ci && npm test

  python-lint:
    needs: changes
    if: >-
      needs.changes.outputs.qpk == 'true' ||
      needs.changes.outputs.flask-core == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check packages/quantum-protein-kernel/classifiers packages/flask-core/src

  qpk-tests:
    needs: changes
    if: needs.changes.outputs.qpk == 'true' || needs.changes.outputs.flask-core == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e packages/flask-core
      - name: Install CPU-only torch and project deps
        run: |
          pip install torch==2.2.2+cpu torchvision==0.17.2+cpu --index-url https://download.pytorch.org/whl/cpu
          cd packages/quantum-protein-kernel
          pip install --no-deps -r requirements.txt
          pip install numpy==1.26.4 Pillow==12.1.1 flask==3.0.2 flask-cors==6.0.2 mistune==3.2.0 scikit-learn==1.8.0
          pip install pytest
      - run: cd packages/quantum-protein-kernel && python -m pytest tests/ -v --tb=short

  lighthouse:
    needs: [changes, astro-build]
    if: needs.changes.outputs.website == 'true' || needs.changes.outputs.ui-kit == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          uploadArtifacts: true
          configPath: .lighthouserc.json

  docker-build:
    needs: changes
    if: needs.changes.outputs.qpk == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - run: docker compose build classifier
