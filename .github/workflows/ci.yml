name: CI

on:
  push:
    branches: [main, overhaul, monorepo-migration]
  pull_request:
    branches: [main]

jobs:
  changes:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      website: ${{ steps.filter.outputs.website }}
      qpk: ${{ steps.filter.outputs.qpk }}
      ui-kit: ${{ steps.filter.outputs.ui-kit }}
      cv: ${{ steps.filter.outputs.cv }}
      tech-tree: ${{ steps.filter.outputs.tech-tree }}
      flask-core: ${{ steps.filter.outputs.flask-core }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            website:
              - 'src/**'
              - 'astro.config.mjs'
              - 'package.json'
              - 'packages/shared-js/**'
            qpk:
              - 'quantum-protein-kernel/**'
            ui-kit:
              - 'packages/ui-kit/**'
            cv:
              - 'cv/**'
            tech-tree:
              - 'tech-tree/**'
            flask-core:
              - 'packages/flask-core/**'

  astro-build:
    needs: changes
    if: needs.changes.outputs.website == 'true' || needs.changes.outputs.ui-kit == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm ci
      - run: npm test
      - run: npm run build

  ui-kit-tests:
    needs: changes
    if: needs.changes.outputs.ui-kit == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: cd packages/ui-kit && npm ci && npx jest --verbose

  cv-tests:
    needs: changes
    if: needs.changes.outputs.cv == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: cd cv/editor && npm ci && npm test

  tech-tree-tests:
    needs: changes
    if: needs.changes.outputs.tech-tree == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: node --test tech-tree/tests/test_data.mjs

  python-lint:
    needs: changes
    if: >-
      needs.changes.outputs.qpk == 'true' ||
      needs.changes.outputs.flask-core == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check quantum-protein-kernel/classifiers packages/flask-core/src

  qpk-tests:
    needs: changes
    if: needs.changes.outputs.qpk == 'true' || needs.changes.outputs.flask-core == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e packages/flask-core
      - run: cd quantum-protein-kernel && pip install -r requirements.txt && pip install pytest
      - run: cd quantum-protein-kernel && python -m pytest tests/ -v --tb=short

  docker-build:
    needs: changes
    if: needs.changes.outputs.qpk == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker compose build classifiers
