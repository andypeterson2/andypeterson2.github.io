name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    name: Unit Tests (Jest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: lib/ui-kit/v1.1
        run: npm ci

      - name: Run unit tests
        working-directory: lib/ui-kit/v1.1
        run: npx jest --verbose

  nonogram-unit-tests:
    name: Nonogram Unit Tests (Jest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: nonogram/website
        run: npm ci

      - name: Run nonogram unit tests
        working-directory: nonogram/website
        run: npx jest --verbose

  dashboard-unit-tests:
    name: Dashboard Unit Tests (Jest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: dashboard/website
        run: npm ci

      - name: Run dashboard unit tests
        working-directory: dashboard/website
        run: npx jest --verbose

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run integration tests
        run: node tests/test_pages.mjs
