name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# The portal is now a single standalone Astro app — each sub-app lives in its own
# repo with its own CI, and its built frontend is vendored under public/<app>/.
# So CI here only lints, tests, builds, and e2e-checks the portal (no submodules).
jobs:
  astro-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm audit --audit-level=high
      - run: npm run lint
      - name: Install poppler-utils (pdftotext — for the committed-PDF PII scan)
        run: sudo apt-get update && sudo apt-get install -y poppler-utils
      - name: Check name leakage
        run: bash scripts/check-name-leakage.sh
        env:
          PROTECTED_NAMES: ${{ secrets.PROTECTED_NAMES }}
      - run: npm test -- --coverage
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage
          path: coverage/
          retention-days: 7
      - run: npm run build
        env:
          # Public site identity — kept in sync with deploy.yml so the tested build
          # matches production. Set as repository variables; unset → "Portfolio".
          SITE_DISPLAY_NAME: ${{ vars.SITE_DISPLAY_NAME }}
          SITE_DOMAIN: ${{ vars.SITE_DOMAIN }}
          SITE_URL: ${{ vars.SITE_URL }}
          SITE_EMAIL: ${{ vars.SITE_EMAIL }}
          SITE_GITHUB: ${{ vars.SITE_GITHUB }}
          SITE_LINKEDIN: ${{ vars.SITE_LINKEDIN }}
      - name: Verify CSP ships in built output
        run: bash scripts/check-security-headers.sh
      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/
          retention-days: 5

  e2e-tests:
    needs: astro-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      # PR runs use chromium only (fast feedback); firefox/webkit run in full sweeps.
      - name: Install Playwright browser + system deps
        run: |
          # The runner ships pre-configured Microsoft apt repos (azure-cli, prod)
          # that intermittently serve an unsigned InRelease, which makes the
          # `apt-get update` inside `--with-deps` fail the whole job. Drop those
          # sources first; chromium's system deps come from the Ubuntu repos.
          sudo rm -f /etc/apt/sources.list.d/*microsoft* /etc/apt/sources.list.d/*azure* 2>/dev/null || true
          npx playwright install --with-deps chromium
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/
      - name: Run E2E tests
        run: npx playwright test
        env:
          CI: true
      - uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  contract-schemas:
    # The live-HTTP contract tests run in each app's own repo (they boot a backend).
    # The portal keeps the canonical written contract and verifies the schemas are
    # well-formed JSON Schemas — no backend needed.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install jsonschema
      - name: Validate API-contract JSON Schemas
        run: |
          python3 - <<'PY'
          import glob, json, sys
          from jsonschema import Draft202012Validator
          bad = 0
          for f in sorted(glob.glob("docs/api-contract/schemas/*.json")):
              try:
                  Draft202012Validator.check_schema(json.load(open(f)))
                  print(f"ok  {f}")
              except Exception as e:
                  print(f"BAD {f}: {e}")
                  bad += 1
          sys.exit(1 if bad else 0)
          PY

  lighthouse-desktop:
    needs: astro-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/
      - name: Lighthouse CI (desktop)
        uses: treosh/lighthouse-ci-action@3e7e23fb74242897f95c0ba9cabad3d0227b9b18 # v12
        with:
          uploadArtifacts: true
          artifactName: lighthouse-desktop-results
          configPath: .lighthouserc.json

  lighthouse-mobile:
    needs: astro-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/
      - name: Lighthouse CI (mobile)
        uses: treosh/lighthouse-ci-action@3e7e23fb74242897f95c0ba9cabad3d0227b9b18 # v12
        with:
          uploadArtifacts: true
          artifactName: lighthouse-mobile-results
          configPath: .lighthouserc.mobile.json
