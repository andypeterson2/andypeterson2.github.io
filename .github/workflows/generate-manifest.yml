name: Generate site manifest

on:
  push:
    branches: [main]
    paths-ignore:
      - 'site-manifest.json'

jobs:
  manifest:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Generate manifest
        run: python3 generate-manifest.py

      - name: Create PR if manifest changed
        run: |
          git diff --quiet site-manifest.json && echo "No changes" && exit 0
          BRANCH="chore/update-manifest-$(date +%s)"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add site-manifest.json
          git commit -m "chore: regenerate site-manifest.json"
          git push origin "$BRANCH"
          gh pr create --title "chore: regenerate site-manifest.json" --body "Auto-generated manifest update." --base main --head "$BRANCH"
        env:
          GH_TOKEN: ${{ github.token }}
