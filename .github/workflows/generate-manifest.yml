name: Generate site manifest

on:
  push:
    branches: [main]
    paths-ignore:
      - 'site-manifest.json'

jobs:
  manifest:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      # The manifest is derived from the built routes, so build first.
      - run: npm run build

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Generate manifest from built site
        run: python3 scripts/generate-manifest.py dist

      - name: Commit manifest if changed
        run: |
          git add site-manifest.json
          git diff --cached --quiet site-manifest.json && echo "No changes" && exit 0
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: regenerate site-manifest.json"
          git push
