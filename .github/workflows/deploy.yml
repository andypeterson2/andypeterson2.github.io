name: Deploy to GitHub Pages

# Gated on CI: this runs only after the "CI" workflow finishes on main, and the
# build job below is guarded on a successful conclusion — so a red build cannot
# deploy. Deploy-on-every-push-to-main is preserved (CI itself runs on every such
# push). workflow_dispatch stays available for manual redeploys.
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    # Manual runs always build; workflow_run-triggered runs only when CI passed.
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          # Deploy exactly the commit CI validated (falls back to the dispatched ref).
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - uses: actions/setup-node@v7
        with:
          node-version: "22"
          cache: npm

      - run: npm ci
      - run: npm run build
        env:
          # Public site identity — resolved into siteConfig at build (see
          # astro.config envPrefix). All values are public by design; set them as
          # repository *variables* (Settings ▸ Secrets and variables ▸ Actions ▸
          # Variables). Unset → the "Portfolio" fallback.
          SITE_DISPLAY_NAME: ${{ vars.SITE_DISPLAY_NAME }}
          SITE_DOMAIN: ${{ vars.SITE_DOMAIN }}
          SITE_URL: ${{ vars.SITE_URL }}
          SITE_EMAIL: ${{ vars.SITE_EMAIL }}
          SITE_GITHUB: ${{ vars.SITE_GITHUB }}
          SITE_LINKEDIN: ${{ vars.SITE_LINKEDIN }}

      - uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
