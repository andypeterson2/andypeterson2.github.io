services:
  dashboard:
    build: .
    ports:
      - "127.0.0.1:${DASHBOARD_PORT:-5050}:5050"
    environment:
      PORT: 5050
      DASHBOARD_PROJECTS: /projects
      DEV_CERT_DIR: /certs
      OPENPROJECT_URL: ${OPENPROJECT_URL:-http://host.docker.internal:8088}
      OPENPROJECT_TOKEN: ${OPENPROJECT_TOKEN:-}
      OPENPROJECT_HOST_NAME: ${OPENPROJECT_HOST_NAME:-localhost:8088}
    volumes:
      # Required: your projects directory (read-only)
      - ${PROJECTS_DIR:-./../}:/projects:ro
      # Required: Docker socket for container management
      - /var/run/docker.sock:/var/run/docker.sock
      # Optional: custom UI kit (uncomment if using)
      # - ./path/to/ui-kit:/app/src/dashboard/static/ui-kit:ro
      # TLS certificates for HTTPS
      - ${CERT_DIR:-./../.certs}:/certs:ro
