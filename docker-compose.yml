services:
  classifiers:
    build:
      context: .
      dockerfile: quantum-protein-kernel/Dockerfile
    ports:
      - "127.0.0.1:${QPK_PORT:-5001}:5001"
    environment:
      CLASSIFIERS_PORT: "5001"
      CLASSIFIERS_HOST: "0.0.0.0"
      CLASSIFIERS_CORS_ORIGINS: "http://localhost:*"
      DEV_CERT_DIR: ""
    volumes:
      - ./packages/ui-kit:/app/classifiers/static/ui-kit:ro

  cv-editor:
    image: node:20-slim
    command: node server.js
    ports:
      - "127.0.0.1:${CV_PORT:-3001}:3001"
    environment:
      PORT: "3001"
    volumes:
      - ./cv:/app
    working_dir: /app/editor

  tech-tree:
    image: node:20-slim
    command: node serve.mjs
    ports:
      - "127.0.0.1:${TECHTREE_PORT:-8080}:8080"
    environment:
      PORT: "8080"
      HOST: "0.0.0.0"
    volumes:
      - ./tech-tree:/app
    working_dir: /app
