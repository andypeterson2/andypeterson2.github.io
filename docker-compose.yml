services:
  # ── Nginx reverse proxy ──────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    ports:
      - "127.0.0.1:8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./packages/qvc/website/client:/usr/share/nginx/videochat:ro
    depends_on:
      - website
      - classifier
      - nonogram
      - videochat-server
      - videochat-middleware
      - cv-editor

  # ── Astro website (static via lightweight server) ────────────────────
  website:
    image: node:20-slim
    command: npx serve /app/dist -l 8000 --no-clipboard
    working_dir: /app
    volumes:
      - ./dist:/app/dist:ro
    environment:
      PORT: "8000"

  # ── Quantum Protein Kernel (classifier / quantum ML) ─────────────────
  classifier:
    build:
      context: ./packages/quantum-protein-kernel
      dockerfile: Dockerfile
    environment:
      CLASSIFIERS_PORT: "5001"
      CLASSIFIERS_HOST: "0.0.0.0"
      CLASSIFIERS_CORS_ORIGINS: "http://localhost:*,https://andypeterson.dev"
      DEV_CERT_DIR: ""
    volumes:
      - ./packages/ui-kit:/app/classifiers/static/ui-kit:ro

  # ── Nonogram solver ──────────────────────────────────────────────────
  nonogram:
    build:
      context: ./packages/nonogram
      dockerfile: Dockerfile
    environment:
      PORT: "5055"
      DEV_CERT_DIR: ""
      NONOGRAM_HOST: "0.0.0.0"

  # ── QVC server (quantum key distribution) ────────────────────────────
  videochat-server:
    build:
      context: ./packages/qvc
      dockerfile: Dockerfile.server
    environment:
      QVC_SERVER_REST_PORT: "5050"
      QVC_LOCAL_IP: "0.0.0.0"
    volumes:
      - ./packages/qvc/logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5050/admin/status"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── QVC client A (middleware) ─────────────────────────────────────────
  videochat-middleware:
    build:
      context: ./packages/qvc
      dockerfile: Dockerfile.client
    image: qvc-client:local
    environment:
      QUANTUM_SERVER_HOST: videochat-server
      QUANTUM_SERVER_PORT: "5050"
    command: ["python", "middleware/client.py", "--port", "5002"]
    depends_on:
      videochat-server:
        condition: service_healthy

  # ── QVC client B ─────────────────────────────────────────────────────
  videochat-client-b:
    image: qvc-client:local
    environment:
      QUANTUM_SERVER_HOST: videochat-server
      QUANTUM_SERVER_PORT: "5050"
    command: ["python", "middleware/client.py", "--port", "5003"]
    depends_on:
      videochat-server:
        condition: service_healthy

  # ── CV Editor ────────────────────────────────────────────────────────
  cv-editor:
    image: node:20-slim
    command: node server.js
    environment:
      PORT: "3000"
      HOST: "0.0.0.0"
    volumes:
      - ./packages/cv:/app
    working_dir: /app/editor
