worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;
    client_max_body_size 20M;

    # ── Gzip compression ──────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_min_length 256;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss image/svg+xml;

    # ── Rate limiting ─────────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=general:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;

    # ── Upstreams ──────────────────────────────────────────────────────
    upstream website   { server website:8000;              }
    upstream cv        { server cv-editor:3000;            }
    upstream classifier{ server classifier:5001;           }
    upstream nonogram  { server nonogram:5055;             }
    upstream videochat { server videochat-middleware:5002;  }

    server {
        listen 80;
        server_name localhost;

        # ── Security headers ────────────────────────────────────────────
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # ── UI Kit (versioned — immutable cache) ─────────────────────
        location /lib/ui-kit/ {
            proxy_pass http://website/lib/ui-kit/;
            proxy_set_header Host $host;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # ── Website (root) ────────────────────────────────────────────
        location / {
            limit_req zone=general burst=60 nodelay;
            proxy_pass http://website/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── CV Editor ─────────────────────────────────────────────────
        location /cv/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://cv/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # ── Classifier (SSE — disable buffering) ─────────────────────
        location /classifier/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://classifier/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_http_version 1.1;
            proxy_set_header Connection '';
            proxy_buffering off;
            proxy_cache off;
            chunked_transfer_encoding off;
        }

        # ── Nonogram Solver (WebSocket + SocketIO) ────────────────────
        location /nonogram/ {
            limit_req zone=general burst=60 nodelay;
            proxy_pass http://nonogram/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 86400;
        }
        location /nonogram/socket.io/ {
            proxy_pass http://nonogram/socket.io/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_read_timeout 86400;
        }

        # ── Video Chat (static frontend from build volume) ────────────
        location /videochat/ {
            alias /usr/share/nginx/videochat/;
            try_files $uri $uri/ /videochat/index.html;
        }
        # Video Chat middleware API + SocketIO
        location /videochat/api/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://videochat/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_read_timeout 86400;
        }
        location /videochat/socket.io/ {
            proxy_pass http://videochat/socket.io/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_read_timeout 86400;
        }
    }
}
