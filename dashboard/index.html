<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard</title>
  <script src="https://andypeterson2.github.io/ui-kit/theme-bootstrap.js"></script>
  <link rel="stylesheet" href="https://andypeterson2.github.io/ui-kit/ui-kit.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
  <script src="https://andypeterson2.github.io/ui-kit/service-config.js"></script>
  <link rel="stylesheet" href="static/css/app.css">
</head>
<body>
  <div class="app">
    <!-- Top bar -->
    <div class="app-topbar">
      <div class="topbar-left">
        <span class="topbar-brand" data-icon="gear"></span>
        <span class="topbar-title">Dashboard</span>
        <span class="topbar-count">0 projects</span>
      </div>
      <div class="topbar-right">
        <button class="btn btn-xs btn-secondary" id="btn-refresh" title="Rescan projects">
          <span data-icon="refresh"></span> Refresh
        </button>
        <div id="backend-connect"></div>
      </div>
    </div>

    <div class="app-body">
      <!-- Sidebar -->
      <aside class="app-sidebar" id="sidebar">
        <div class="sidebar-header">
          <h3>Projects</h3>
        </div>
        <div class="sidebar-scroll">
          <div class="empty-state">
            <p>No projects found.</p>
            <p class="text-muted">Connect a backend to see projects.</p>
          </div>
        </div>
      </aside>

      <!-- Workspace -->
      <div class="workspace">
        <!-- Tab bar -->
        <div class="tab-bar" id="tab-bar">
          <div class="tab-bar-scroll" id="tab-bar-scroll">
            <!-- Tabs inserted by JS -->
          </div>
        </div>

        <!-- Tab content area -->
        <main class="app-main" id="tab-content">
          <div class="welcome-state" id="welcome">
            <div class="welcome-inner">
              <h2>Welcome</h2>
              <p>Expand a project in the sidebar and click a service to start it.</p>
              <p class="text-muted">Each service runs as a Docker container with live logs.</p>
            </div>
          </div>
        </main>
      </div>
    </div>
  </div>

  <button id="theme-toggle" class="ui-theme-toggle" aria-label="Toggle theme"></button>

  <script src="https://andypeterson2.github.io/ui-kit/icons.js"></script>
  <script src="https://andypeterson2.github.io/ui-kit/ui-kit.js"></script>
  <script>const API_BASE = ServiceConfig.get("dashboard", "http://localhost:5050");</script>
  <script src="static/js/app.js"></script>
  <script>
    (function() {
      var el = document.getElementById('backend-connect');
      if (el && window.UIKit && UIKit.initConnect) {
        UIKit.initConnect(el, {
          service: 'dashboard',
          defaultHost: 'localhost',
          defaultPort: 5050,
          label: 'Backend'
        });
      }
    })();
  </script>
</body>
</html>
