<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — Dev Environment</title>
  <link rel="icon" type="image/x-icon" href="/images/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="/images/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/images/favicon-16x16.png">
  <meta name="site-nav-label" content="Dashboard">
  <meta name="site-nav-icon" content="fa-solid fa-gear">
  <meta name="site-backend-service" content="dashboard">
  <meta name="site-backend-port" content="5050">
  <script src="/lib/ui-kit/v1.1/theme-bootstrap.js"></script>
  <script src="/shared/site-nav.js" defer></script>
  <link rel="stylesheet" href="/lib/ui-kit/v1.1/ui-kit.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
  <script src="/lib/ui-kit/v1.1/service-config.js"></script>
  <link rel="stylesheet" href="static/css/app.css">
</head>
<body>
  <div class="app">
    <!-- Top bar -->
    <div class="app-topbar">
      <div class="topbar-left">
        <span class="topbar-brand" data-icon="gear"></span>
        <span class="topbar-title">Dashboard</span>
        <span class="topbar-count">0 projects</span>
      </div>
      <div class="topbar-right">
        <button class="btn btn-xs btn-secondary" id="btn-refresh" title="Rescan projects">
          <span data-icon="refresh"></span> Refresh
        </button>
      </div>
    </div>

    <div class="app-body">
      <!-- Sidebar -->
      <nav class="app-sidebar" id="sidebar" aria-label="Project list">
        <div class="sidebar-header">
          <h3>Projects</h3>
        </div>
        <div class="sidebar-scroll">
          <div class="empty-state">
            <p>No projects found.</p>
            <p class="text-muted">Connect a backend to see projects.</p>
          </div>
        </div>
      </nav>

      <!-- Workspace -->
      <div class="workspace">
        <!-- Tab bar -->
        <div class="tab-bar" id="tab-bar" role="tablist" aria-label="Running services">
          <div class="tab-bar-scroll" id="tab-bar-scroll">
            <!-- Tabs inserted by JS -->
          </div>
        </div>

        <!-- Tab content area -->
        <main class="app-main" id="tab-content">
          <div class="welcome-state" id="welcome">
            <div class="welcome-inner">
              <h2>Welcome</h2>
              <p>Expand a project in the sidebar and click a service to start it.</p>
              <p class="text-muted">Each service runs as a Docker container with live logs.</p>
            </div>
          </div>
        </main>
      </div>

      <!-- Right drawer: Server connection -->
      <div class="drawer drawer-right" id="server-drawer">
        <button class="side-handle side-handle-right" id="server-handle" aria-expanded="false">
          <span class="drawer-chevron">&#9654;</span>
          <span>Server</span>
        </button>
        <div class="side-panel side-panel-right">
          <div class="side-panel-header">
            <div class="side-panel-title">Backend Connection</div>
          </div>
          <div style="overflow-y: auto; flex: 1; display: flex; flex-direction: column;">
            <div class="log-terminal" id="connect-log" style="flex: 1; min-height: 120px;"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <button id="theme-toggle" class="ui-theme-toggle" aria-label="Toggle theme"></button>

  <script src="/lib/ui-kit/v1.1/icons.js"></script>
  <script src="/lib/ui-kit/v1.1/ui-kit.js"></script>
  <script>var API_BASE = (ServiceConfig.resolveBackend || ServiceConfig.get).call(ServiceConfig, "dashboard", "https://localhost:5050");</script>
  <script src="static/js/app.js"></script>
  <script>
    (function() {
      // Init drawer
      var drawer = document.getElementById('server-drawer');
      var handle = document.getElementById('server-handle');
      if (drawer && handle && window.UIKit && UIKit.initDrawer) {
        UIKit.initDrawer(drawer, handle);
      }

      // Init connection log
      var logEl = document.getElementById('connect-log');
      var connLog = (window.UIKit && UIKit.createLogger) ? UIKit.createLogger(logEl, 300) : function() {};

      // Listen for the shared navbar connect widget
      document.addEventListener("navbar:connect-ready", function(e) {
        if (e.detail.service !== "dashboard") return;
        var connect = e.detail.widget;

        // Override onConnect via click intercept — re-init with callback
        var btnEl = document.getElementById('navbar-backend-connect');
        if (btnEl) {
          var btn = btnEl.querySelector('.ui-connect-btn');
          if (btn) {
            btn.addEventListener('click', function() {
              var url = connect.getUrl();
              connect.setStatus('connecting');
              connLog('Connecting to ' + url + '...', 'ok');
              API_BASE = url;

              fetch(url + '/api/projects')
                .then(function(r) {
                  if (!r.ok) throw new Error('HTTP ' + r.status);
                  return r.json();
                })
                .then(function(projects) {
                  connect.setStatus('connected');
                  connLog('Connected — ' + projects.length + ' projects found', 'ok');
                  if (window.loadProjects) loadProjects();
                })
                .catch(function(err) {
                  connect.setStatus('error', err.message);
                  connLog('Connection failed: ' + err.message, 'err');
                  if (location.protocol === 'https:') {
                    connLog('Note: HTTPS pages may block HTTP localhost requests.', 'warn');
                  }
                });
            });
          }
        }

        // Auto-connect on load if configured
        if (ServiceConfig.isConfigured('dashboard')) {
          connLog('Auto-connecting to ' + API_BASE + '...', 'ok');
          connect.setStatus('connecting');
          fetch(API_BASE + '/api/projects')
            .then(function(r) {
              if (!r.ok) throw new Error('HTTP ' + r.status);
              return r.json();
            })
            .then(function(projects) {
              connect.setStatus('connected');
              connLog('Connected — ' + projects.length + ' projects found', 'ok');
            })
            .catch(function(err) {
              connect.setStatus('error', err.message);
              connLog('Auto-connect failed: ' + err.message, 'err');
            });
        } else {
          connLog('No backend configured. Use the top bar to connect.', 'warn');
        }
      });
    })();
  </script>
</body>
</html>
